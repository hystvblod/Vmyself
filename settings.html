<!DOCTYPE html>
<html lang="fr" data-page="settings">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vmyself - Réglages</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="page-top card thin">
      <div>
        <div class="eyebrow">Vmyself</div>
        <h1 data-i18n="settings.title"></h1>
      </div>
      <a href="index.html" class="btn ghost" data-i18n="common.back"></a>
    </header>

    <main class="page-content stack">
      <section class="card">
        <div class="section-heading">
          <div>
            <div class="eyebrow" data-i18n="settings.privacyEyebrow"></div>
            <h2 data-i18n="settings.privacyTitle"></h2>
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <strong data-i18n="settings.hideSensitive"></strong>
            <p class="muted" data-i18n="settings.hideSensitiveDesc"></p>
          </div>
          <label class="switch">
            <input id="toggleSensitive" type="checkbox" />
            <span></span>
          </label>
        </div>

        <div class="toggle-row">
          <div>
            <strong data-i18n="settings.lockOnOpen"></strong>
            <p class="muted" data-i18n="settings.lockOnOpenDesc"></p>
          </div>
          <label class="switch">
            <input id="toggleLock" type="checkbox" />
            <span></span>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="section-heading">
          <div>
            <div class="eyebrow" data-i18n="settings.langEyebrow"></div>
            <h2 data-i18n="settings.langTitle"></h2>
          </div>
        </div>

        <select id="languageSelect" class="field"></select>
      </section>

      <section class="card">
        <div class="section-heading">
          <div>
            <div class="eyebrow" data-i18n="settings.dataEyebrow"></div>
            <h2 data-i18n="settings.dataTitle"></h2>
          </div>
        </div>

        <div class="grid-2">
          <button id="exportDataBtn" class="btn soft" data-i18n="settings.export"></button>
          <button id="resetDataBtn" class="btn danger ghost-danger" data-i18n="settings.reset"></button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      <a href="journal.html" class="nav-link" data-i18n="nav.journal"></a>
      <a href="profile.html" class="nav-link" data-i18n="nav.profile"></a>
      <a href="vault.html" class="nav-link" data-i18n="nav.vault"></a>
      <a href="settings.html" class="nav-link active" data-i18n="nav.settings"></a>
    </nav>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
