<!DOCTYPE html>
<html lang="fr" data-page="shop">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vmyself - Boutique</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="page-top card thin">
      <div>
        <div class="eyebrow">Vmyself</div>
        <h1 data-i18n="shop.title"></h1>
      </div>
      <a href="index.html" class="btn ghost" data-i18n="common.back"></a>
    </header>

    <main class="page-content stack">
      <section class="card">
        <div class="section-heading">
          <div>
            <div class="eyebrow" data-i18n="shop.premiumEyebrow"></div>
            <h2 data-i18n="shop.premiumTitle"></h2>
          </div>
        </div>

        <div class="price-card premium">
          <div>
            <strong data-i18n="shop.premiumName"></strong>
            <p class="muted" data-i18n="shop.premiumDesc"></p>
          </div>
          <button id="buyPremiumBtn" class="btn primary" data-i18n="shop.buyPremium"></button>
        </div>

        <div class="feature-list">
          <div class="feature-row">
            <span data-i18n="shop.feature1"></span>
            <span class="pill premium-pill" data-i18n="common.premium"></span>
          </div>
          <div class="feature-row">
            <span data-i18n="shop.feature2"></span>
            <span class="pill premium-pill" data-i18n="common.premium"></span>
          </div>
          <div class="feature-row">
            <span data-i18n="shop.feature3"></span>
            <span class="pill premium-pill" data-i18n="common.premium"></span>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-heading">
          <div>
            <div class="eyebrow" data-i18n="shop.adsEyebrow"></div>
            <h2 data-i18n="shop.adsTitle"></h2>
          </div>
        </div>
        <div class="price-card">
          <div>
            <strong data-i18n="shop.removeAds"></strong>
            <p class="muted" data-i18n="shop.removeAdsDesc"></p>
          </div>
          <button id="buyNoAdsBtn" class="btn soft" data-i18n="shop.buyNoAds"></button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      <a href="journal.html" class="nav-link" data-i18n="nav.journal"></a>
      <a href="profile.html" class="nav-link" data-i18n="nav.profile"></a>
      <a href="vault.html" class="nav-link" data-i18n="nav.vault"></a>
      <a href="settings.html" class="nav-link" data-i18n="nav.settings"></a>
    </nav>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ads.js"></script>
  <script src="js/purchases.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
